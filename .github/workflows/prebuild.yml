name: Build prebuilds

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild:
    name: Prebuild (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-2022]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 libx11-dev libxtst-dev libxrandr-dev
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build addon
        run: pnpm run build:native

      - name: Stage prebuild
        shell: bash
        run: |
          ABI="$(node -p 'process.versions.modules')"
          PLATFORM="$(node -p 'process.platform')"
          ARCH="$(node -p 'process.arch')"
          DEST="prebuilds/${PLATFORM}-${ARCH}-napi-abi${ABI}"
          mkdir -p "$DEST"
          cp native/build/Release/robot_ts_native.node "$DEST/"
          ls -la "$DEST"

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}-node${{ matrix.node }}
          path: prebuilds/
          if-no-files-found: error
          retention-days: 7
